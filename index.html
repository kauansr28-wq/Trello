<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <script>
        var t = window.TrelloPowerUp.iframe();

        window.TrelloPowerUp.initialize({
            'board-buttons': function(t) {
                return [{
                    text: 'Configurações',
                    callback: function(t) {
                        return t.popup({
                            title: 'Configurações',
                            url: './index.html?settings=true',
                            height: 100
                        });
                    }
                }];
            }
        });
    </script>
</body>
</html>
