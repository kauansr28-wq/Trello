<!DOCTYPE html>
<html>
<head>
   <!-- Verifique se esta linha existe no seu index.html -->
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script src="./client.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #0079bf; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <span>Mostrar descrições:</span>
    <label class="switch">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
    </label>

    <script>
        var t = window.TrelloPowerUp.iframe();

        // Carrega o estado atual ao abrir
        t.get('board', 'shared', 'showDescriptions', false).then(function(val) {
            document.getElementById('toggleSwitch').checked = val;
        });

        // Salva ao alterar
        document.getElementById('toggleSwitch').addEventListener('change', function(e) {
            t.set('board', 'shared', 'showDescriptions', e.target.checked).then(function() {
                t.closePopup(); // Fecha o popup automaticamente após mudar
                t.board('id').then(function(board) {
                     // Recarrega o quadro para aplicar as mudanças
                     location.reload(); 
                });
            });
        });
    </script>
</body>
</html>
