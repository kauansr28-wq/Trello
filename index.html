<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Power-Up Trello</title>
    <!-- Carrega a biblioteca oficial do Trello -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        /* Estilos da Interface (quando aberto como popup) */
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; display: none; background: #fff; }
        .visible { display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        input:checked + .slider { background-color: #0079bf; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <!-- Interface do Popup de Configurações -->
    <div id="settings-ui" class="visible">
        <span>Mostrar descrições:</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        // 1. Inicializa o Power-Up
        var t = window.TrelloPowerUp.iframe();

        // 2. Lógica de Inicialização (antes era no client.js)
        window.TrelloPowerUp.initialize({
            'board-buttons': function(t) {
                return [{
                    text: 'Configurações',
                    callback: function(t) {
                        return t.popup({
                            title: 'Configurações',
                            url: './index.html?settings=true',
                            height: 80
                        });
                    }
                }];
            },
            'card-badges': function(t) {
                return t.get('board', 'shared', 'showDescriptions', false)
                    .then(function(showDescriptions) {
                        if (!showDescriptions) return [];
                        return t.card('desc').then(function(card) {
                            if (!card.desc || card.desc.trim() === '') return [];
                            let textoLimpo = card.desc.replace(/[`*#_~>]/g, "").replace(/\n/g, " ").trim();
                            let preview = textoLimpo.length > 35 ? textoLimpo.substring(0, 32) + '...' : textoLimpo;
                            return [{ text: preview, color: 'blue' }];
                        });
                    });
            }
        });

        // 3. Lógica do Popup (Configurações)
        if (window.location.search.includes('settings=true')) {
            document.body.style.display = 'block';
            
            // Carrega estado salvo
            t.get('board', 'shared', 'showDescriptions', false).then(function(val) {
                document.getElementById('toggleSwitch').checked = val;
            });

            // Salva ao alterar
            document.getElementById('toggleSwitch').addEventListener('change', function(e) {
                t.set('board', 'shared', 'showDescriptions', e.target.checked).then(function() {
                    t.closePopup();
                });
            });
        }
    </script>
</body>
</html>
