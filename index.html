<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; display: none; color: #172b4d; background-color: #fff; }
        .visible { display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #0079bf; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div id="settings-ui" class="visible">
        <span>Mostrar descrições:</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        var t = window.TrelloPowerUp.iframe();

        window.TrelloPowerUp.initialize({
            'board-buttons': function(t) {
                return [{
                    text: 'Configurações',
                    callback: function(t) {
                        return t.popup({ title: 'Configurações', url: './index.html?settings=true', height: 80 });
                    }
                }];
            },
            'card-badges': function(t) {
                console.log("Debug: Tentando ler configuração...");
                return t.get('board', 'shared', 'showDescriptions', false)
                    .then(function(show) {
                        console.log("Debug: Valor encontrado: " + show);
                        if (!show) return [];
                        
                        return t.card('desc').then(function(card) {
                            if (!card.desc || card.desc.trim() === '') {
                                console.log("Debug: Descrição vazia.");
                                return [];
                            }
                            let text = card.desc.replace(/[`*#_~>]/g, "").replace(/\n/g, " ").trim();
                            let preview = text.length > 35 ? text.substring(0, 32) + '...' : text;
                            console.log("Debug: Badge gerado: " + preview);
                            return [{ text: preview, color: 'blue' }];
                        });
                    });
            }
        });

        if (window.location.search.includes('settings=true')) {
            document.body.style.display = 'block';
            
            t.get('board', 'shared', 'showDescriptions', false).then(function(val) {
                document.getElementById('toggleSwitch').checked = val;
            });

            document.getElementById('toggleSwitch').addEventListener('change', function(e) {
                t.set('board', 'shared', 'showDescriptions', e.target.checked).then(function() {
                    console.log("Debug: Configuração salva como: " + e.target.checked);
                    // Avisa o Trello para renderizar novamente
                    t.closePopup();
                });
            });
        }
    </script>
</body>
</html>
