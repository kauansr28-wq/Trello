<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Power-Up Consolidado</title>
    <!-- Carrega a API do Trello -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f5f7; }
        .hidden { display: none; }
        .visible { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #0079bf; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <!-- Interface visível apenas se for popup de configurações -->
    <div id="settings-ui" class="hidden">
        <span>Mostrar descrições:</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        var t = window.TrelloPowerUp.iframe();

        // 1. Configurações do Power-Up
        window.TrelloPowerUp.initialize({
            'board-buttons': function(t) {
                return [{
                    text: 'Configurações',
                    callback: function(t) {
                        return t.popup({
                            title: 'Configurações',
                            url: './index.html?settings=true',
                            height: 100
                        });
                    }
                }];
            },
            'card-badges': function(t) {
                return t.get('board', 'shared', 'showDescriptions', false)
                    .then(function(showDescriptions) {
                        if (!showDescriptions) return [];
                        return t.card('desc').then(function(card) {
                            if (!card.desc || card.desc.trim() === '') return [];
                            // Corta o texto para o badge
                            let preview = card.desc.substring(0, 30) + '...';
                            return [{ text: preview, color: 'blue' }];
                        });
                    });
            }
        });

        // 2. Lógica para exibir a interface apenas no popup
        if (window.location.search.includes('settings=true')) {
            document.getElementById('settings-ui').classList.remove('hidden');
            
            t.get('board', 'shared', 'showDescriptions', false).then(function(val) {
                document.getElementById('toggleSwitch').checked = val;
            });

            document.getElementById('toggleSwitch').addEventListener('change', function(e) {
                t.set('board', 'shared', 'showDescriptions', e.target.checked).then(function() {
                    t.closePopup();
                });
            });
        }
    </script>
</body>
</html>
