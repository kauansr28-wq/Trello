<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <script>
        var t = window.TrelloPowerUp.iframe();

        // Limpa o texto de caracteres de formatação (Markdown, etc)
        function limparTexto(texto) {
            return texto.replace(/[`*#_~>]/g, "").replace(/\n/g, " ");
        }

        // Fatiador de texto (A lógica que você encontrou no código deles)
        function fatiarTexto(texto, limite, maxLinhas) {
            let palavras = texto.split(" ");
            let linhas = [];
            let linhaAtual = "";

            for (let p of palavras) {
                if ((linhaAtual + p).length <= limite) {
                    linhaAtual += p + " ";
                } else {
                    linhas.push(linhaAtual.trim());
                    linhaAtual = p + " ";
                    if (linhas.length >= maxLinhas) break;
                }
            }
            if (linhas.length < maxLinhas) linhas.push(linhaAtual.trim());
            return linhas.filter(Boolean);
        }

        window.TrelloPowerUp.initialize({
            'board-buttons': function(t) {
                return [{
                    text: 'Visualizador Ativo',
                    callback: function(t) { return t.popup({ title: 'Configurações', url: './index.html?settings=true' }); }
                }];
            },
            'card-badges': function(t) {
                return t.card('desc').then(function(card) {
                    if (!card.desc) return [];
                    
                    // Lógica de "fatiamento" profissional
                    let textoLimpo = limparTexto(card.desc);
                    let linhas = fatiarTexto(textoLimpo, 35, 3); // 35 caracteres, 3 linhas
                    
                    // Retorna o array de badges
                    return linhas.map(function(texto) {
                        return {
                            text: texto,
                            color: 'blue'
                        };
                    });
                });
            }
        });
    </script>
</body>
</html>
