<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sincronizador Pro</title>
    <!-- Carrega a biblioteca oficial do Trello -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <script>
        var t = window.TrelloPowerUp.iframe();

        window.TrelloPowerUp.initialize({
            // Este é o botão no topo do quadro
            'board-buttons': function(t, options) {
                return [{
                    text: 'Sync Total (Descrições)',
                    icon: 'https://cdn.hyperdev.com/us-east-1%3A3d31b21c-01a0-4fc2-84aa-17a4e1268538%2Ficon-grey.svg',
                    callback: function(t) {
                        // 1. Busca todos os cartões e campos do quadro
                        return t.board('id', 'customFields').then(function(board) {
                            var field = board.customFields.find(f => f.name === 'Descrição Pro');
                            
                            if (!field) {
                                // Se o campo não existir, avisa o usuário
                                return t.alert({ message: 'Erro: Campo "Descrição Pro" não encontrado! Crie-o nas configurações do quadro.' });
                            }
                            
                            // 2. Pega todos os cartões com suas descrições
                            return t.cards('id', 'desc').then(function(cards) {
                                var promises = cards.map(function(card) {
                                    // 3. Copia a descrição para o campo personalizado
                                    return t.setCustomField(card.id, field.id, 'text', card.desc);
                                });
                                
                                // 4. Aguarda todos terminarem e avisa
                                return Promise.all(promises).then(function() {
                                    return t.alert({ message: 'Sucesso! Sincronizado ' + cards.length + ' cartões.' });
                                });
                            });
                        });
                    }
                }];
            }
        });
    </script>
</body>
</html>
